<title>Page not found — United Developers</title>
<script>
/* Migration router v2 — site root IS the website folder (Pages deploys ./website as root).
   Handles: (1) legacy /website/... URLs from the old structure, (2) legacy WordPress slugs
   from udroofing.com, (3) github.io project-path vs custom-domain roots. */
(function(){
  try{
    var gh=location.hostname.indexOf("github.io")>-1;
    var ROOT=gh?"/ud-growth-engine/":"/";
    var p=location.pathname;
    // 1. Old structure: strip the /website/ segment
    var legacyPrefix=ROOT+"website/";
    if(p.indexOf(legacyPrefix)===0){
      location.replace(ROOT+p.slice(legacyPrefix.length));return;
    }
    // 2. Legacy WordPress slugs from the old udroofing.com site
    var map={
      "expert-general-contracting-in-md-va":"index.html#services",
      "trusted-roofing-contractors-md":"services/roofing.html",
      "roof-installation":"services/roofing.html",
      "roof-replacement":"services/roofing.html",
      "roof-shingles":"services/roofing.html",
      "flat-roofing":"services/roofing.html",
      "tpo-roofing":"services/roofing.html",
      "metal-roofing-installation-contractors":"services/metal-roofing.html",
      "siding-contractors-md-va":"services/siding.html",
      "siding-installation":"services/siding.html",
      "vinyl-siding-contractors":"services/siding.html",
      "clapboard-siding":"services/siding.html",
      "dutch-lap-siding":"services/siding.html",
      "board-and-batten-siding":"services/siding.html",
      "gutter-installation":"services/gutters.html",
      "gutter-replacement":"services/gutters.html",
      "best-gutter-guards":"services/gutters.html",
      "professional-downspout-installation":"services/gutters.html",
      "5-inch-gutters":"services/gutters.html",
      "6-inch-gutters":"services/gutters.html",
      "window-contractor":"services/windows.html",
      "professional-painters-md":"services/painting.html",
      "completed-construction-work":"projects.html",
      "blog":"resources/",
      "licensed-roofing-company":"about.html",
      "contact-us":"contact.html",
      "get-a-free-inspection":"index.html#quote"
    };
    var seg=p.replace(/\/+$/,"").split("/").pop().toLowerCase();
    if(map[seg]){location.replace(ROOT+map[seg]);return;}
  }catch(e){}
})();
</script>
